name: Manual build and release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (leave empty to auto-generate)"
        required: false
      release_name:
        description: "Release name (leave empty to use the tag)"
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            cc: gcc
            packages: make gcc zip
          - os: ubuntu-latest
            target: linux-i686
            cc: i686-linux-gnu-gcc
            packages: make gcc-i686-linux-gnu zip
          - os: ubuntu-latest
            target: linux-aarch64
            cc: aarch64-linux-gnu-gcc
            packages: make gcc-aarch64-linux-gnu zip
          - os: windows-latest
            target: windows-x86_64
            cc: gcc
            msys2: true
            msystem: UCRT64
            msys2_packages: >-
              make
              mingw-w64-ucrt-x86_64-gcc
              zip

    defaults:
      run:
        shell: ${{ matrix.msys2 && 'msys2 {0}' || 'bash' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux toolchain
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Set up MSYS2 toolchain
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.msys2_packages }}

      - name: Build binaries
        env:
          CC: ${{ matrix.cc }}
        run: |
          make clean
          make -j"$(nproc)"

      - name: Package release artifact
        run: |
          mkdir -p dist
          for bin in unfold wireframe corners faces hiddenwire; do
            if [ -f "${bin}.exe" ]; then
              cp "${bin}.exe" dist/
            elif [ -f "${bin}" ]; then
              cp "${bin}" dist/
            fi
          done

          if [ "$(ls -1 dist | wc -l)" -eq 0 ]; then
            echo "No build outputs found in dist/."
            exit 1
          fi

          archive="papercraft-${{ matrix.target }}-${GITHUB_SHA::7}.zip"
          (cd dist && zip -9 -r "${archive}" .)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: dist/*.zip

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Determine release tag and name
        id: release_meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="manual-${GITHUB_RUN_NUMBER}-$(date -u +%Y%m%d%H%M%S)"
          fi

          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            name="${{ github.event.inputs.release_name }}"
          else
            name="$tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          files: release-assets/*.zip
          generate_release_notes: true
